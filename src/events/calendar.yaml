# =============================================================================
# CMW_News — pre-event alert calendar (SOURCE OF TRUTH)
# =============================================================================
# !!! STAGING — DATES UNVERIFIED. DO NOT set ENABLE_PRE_EVENT_ALERTS=true until
# !!! every `time:` below is confirmed against the official schedule linked on
# !!! its row. These were prepared without live access to the authorities'
# !!! pages (their sites block automated fetches), so treat each as a best-
# !!! effort draft to CHECK, not to trust. A wrong time = an alert at the wrong
# !!! moment, which is the exact failure this system must avoid.
# =============================================================================
# Schema:
#   type/title/time/tz/importance required; offsets/consensus/source_url/status
#   optional. time is local "YYYY-MM-DD HH:MM"; tz is an IANA name.
#   CRITICAL -> 24h+1h · STANDARD -> 1h · SPECIAL -> 1h (manual-only)
#
# Confidence (see chat for the full table):
#   FOMC  decision days verified to fall on Wednesdays + standard pattern — MEDIUM
#   NFP   first-Friday rule (Jul 3 / Aug 7 / Sep 4 2026)                  — MEDIUM
#   ECB   Thursday pattern, exact dates unconfirmed                       — LOW
#   BOJ   2-day MPM, no fixed announce time (12:00 JST assumed)           — LOW
#   CPI   exact mid-month day varies (Tue/Wed/Thu) — HIGHEST verify need  — LOW
#
# SEC ETF and SPECIAL (Jackson Hole) entries REMOVED — no confirmed date.
# Scope: ~one quarter ahead (refresh quarterly). Today is 2026-06-09.
# =============================================================================

