# =============================================================================
# CMW_News — pre-event alert calendar (PRODUCTION · VERIFIED)
# =============================================================================
# Every date+time below was verified against the issuing authority's own
# domain (federalreserve.gov / bls.gov / ecb.europa.eu) on 2026-06-09. Each
# row cites its source. Unverifiable dates were OMITTED, not guessed:
#   * CPI/NFP releases after the dates below could not be confirmed from the
#     BLS schedule pages in this environment — add them as each BLS release
#     embeds its successor's date (quarterly refresh).
#   * BOJ rate decisions are intentionally EXCLUDED: the 2026 meeting DATES
#     are verified (Jul 31 / Sep 18 / Oct 30 / Dec 18, decision on day 2) but
#     the BOJ publishes NO fixed decision TIME, so a precise 1h alert cannot be
#     built on verified data. Re-add only with an explicitly accepted approx.
#
# Times are the authority's stated local clock time + IANA tz (DST-safe):
#   FOMC 14:00 ET (statement, 2nd day) · CPI/NFP 08:30 ET · ECB 14:15 CET (2nd day)
# Tiers: CRITICAL -> 24h+1h · STANDARD -> 1h
# =============================================================================

