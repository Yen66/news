# =============================================================================
# CMW_News — pre-event alert calendar (SOURCE OF TRUTH)
# =============================================================================
# Hand-curated. Refresh quarterly — every event below is published months ahead
# by its authority (Fed/ECB/BOJ calendars, BLS release schedule, SEC deadlines).
#
# Each entry:
#   type:       stable slug (used in the deterministic event_id). Keep unique.
#   title:      short Russian label shown in the alert.
#   time:       local clock time, "YYYY-MM-DD HH:MM" (24h).
#   tz:         IANA timezone (e.g. America/New_York) or "UTC". DST handled.
#   importance: critical (24h+1h) | standard (1h) | special (manual-only, 1h)
#   offsets:    OPTIONAL override, e.g. ["1h"]. Omit to use the tier default.
#   consensus:  OPTIONAL forecast string, shown in the 24h alert.
#   source_url: OPTIONAL link to the authority's schedule.
#   status:     OPTIONAL "scheduled" (default) | "cancelled".
#
# Alert design:
#   CRITICAL  -> FOMC, CPI, NFP, SEC ETF decisions   (24h + 1h)
#   STANDARD  -> ECB, BOJ                             (1h)
#   SPECIAL   -> Jackson Hole, Powell testimony, major SEC hearings,
#                pre-announced major Trump speeches   (1h, ADD MANUALLY)
#
# NOTE: dates below are ILLUSTRATIVE placeholders — replace with the real
# published schedule before enabling ENABLE_PRE_EVENT_ALERTS.
# =============================================================================

